# Pre-commit hooks — run automatically before every `git commit`.
# Install once with: `uv run pre-commit install` (or `make pre-commit-install`).
# Run manually against all files with: `make pre-commit-run`.

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        description: Lint Python files with ruff (no auto-fix in hook; run `make fmt` for fixes)
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff-format
        description: Verify ruff formatting (check-only)
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy
        description: Static type checking with mypy (whole-project, not per-file)
        entry: uv run mypy src/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
