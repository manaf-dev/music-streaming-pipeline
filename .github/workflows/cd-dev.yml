name: CD (dev)

on:
  push:
    branches: [development]

# Only one dev deploy at a time; queue later pushes.
concurrency:
  group: cd-dev
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC token exchange with AWS STS
  contents: read

env:
  PYTHON_VERSION: "3.12"
  TERRAFORM_VERSION: "1.7.5"

jobs:
  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install JDK 17 (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: mypy
        run: uv run mypy src/

      - name: pytest with coverage gate
        run: uv run pytest tests/unit/ --cov=src --cov-fail-under=80

  deploy:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: test
    environment: development
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-cd-dev-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform apply
        working-directory: terraform/environments/dev
        env:
          TF_VAR_region: ${{ vars.AWS_REGION }}
          TF_VAR_bucket_name: ${{ vars.S3_BUCKET_NAME_DEV }}
          TF_VAR_sns_alert_email: ${{ secrets.SNS_ALERT_EMAIL }}
        run: terraform apply -auto-approve
